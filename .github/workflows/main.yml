name: Trigger Condition Test

on:
  workflow_dispatch:  # 수동 실행

jobs:
  check-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Find Release PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
            });

            const releasePR = pulls.data.find(pr =>
              pr.head.ref.startsWith('release/')
            );

            if (!releasePR) {
              core.setFailed('열려있는 Release PR이 없습니다.');
              return;
            }

            console.log(`Release PR 발견: ${releasePR.title}`);
            console.log(`브랜치: ${releasePR.head.ref}`);

            core.setOutput('branch', releasePR.head.ref);
            core.setOutput('pr_number', releasePR.number);
            core.setOutput('pr_title', releasePR.title);

      - name: Check Event Info
        run: |
          echo "🚀 트리거 성공!"
          echo "현재 이벤트: workflow_dispatch (수동 실행)"
          echo "PR 브랜치: ${{ steps.find-pr.outputs.branch }}"
          echo "PR 제목: ${{ steps.find-pr.outputs.pr_title }}"
          echo "작성자: ${{ github.actor }}"

      - name: Detailed Logic Simulation
        run: |
          echo "✅ 열려있는 Release PR 감지로 인한 빌드 시작"
          echo "브랜치: ${{ steps.find-pr.outputs.branch }}"
          echo "PR 번호: ${{ steps.find-pr.outputs.pr_number }}"
          # 빌드 & 배포 파일 추출 로직
